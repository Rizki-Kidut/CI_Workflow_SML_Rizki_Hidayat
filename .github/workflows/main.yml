name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DATA_TRAIN: "MLProject/heart_disease_train.csv"
  DATA_TEST:  "MLProject/heart_disease_test.csv"
  TARGET:     "num"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout
      - uses: actions/checkout@v3

      # ── Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # ── Step 3: Check Env
      - name: Check Env
        run: |
          echo "DATA_TRAIN : $DATA_TRAIN"
          echo "DATA_TEST  : $DATA_TEST"
          echo "TARGET     : $TARGET"

      # ── Step 4: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 5: Run MLflow Project
      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local

      # ── Step 6: Get latest MLflow run_id
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(python - << 'PYEOF'
          import mlflow
          client = mlflow.tracking.MlflowClient()
          experiments = client.search_experiments()
          runs = client.search_runs(
              experiment_ids=[e.experiment_id for e in experiments],
              order_by=["attributes.start_time DESC"],
              max_results=1
          )
          print(runs[0].info.run_id)
          PYEOF
          )
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "✅ Latest Run ID: $RUN_ID"

      # ── Step 7: Upload to Google Drive
      - name: Upload to Google Drive
        env:
          GDRIVE_CLIENT_ID:     ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID:     ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python MLProject/upload_to_gdrive.py

      # ── Step 8: Build Docker Model
      # Fix: tambah --env-manager=local agar tidak coba install Python 3.9 via apt
      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name heart \
            --env-manager=local

      # ── Step 9: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # ── Step 10: Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag heart ${{ secrets.DOCKER_HUB_USERNAME }}/heart:latest

      # ── Step 11: Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/heart:latest
